AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: Moldy Pumpkins - publishes curated movie & TV lists as JSON for Radarr/Sonarr

Parameters:
  BucketName:
    Type: String
    Description: >-
      Globally-unique S3 bucket name to create and publish the JSON lists to.
      No default: S3 names share one global namespace, so each deployment must
      supply its own.
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
  TmdbKey:
    Type: String
    NoEcho: true
  TmdbPosterUrl:
    Type: String
    Default: 'https://image.tmdb.org/t/p/w500'
  TvdbKey:
    Type: String
    NoEcho: true
  TvdbPin:
    Type: String
    Default: ''
    NoEcho: true

Resources:
  MoldyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  MoldyBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MoldyBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/*'

  CertifiedFresh:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/index.ts
        External:
          - '@aws-sdk/*'
        Format: esm
        Target: node22
        Minify: false
        Sourcemap: true
        OutExtension:
          - .js=.mjs
        Banner:
          # cheerio's transitive CommonJS deps (iconv-lite/safer-buffer) call
          # require(); supply a real require() so esbuild's ESM stub resolves it
          # instead of throwing "Dynamic require ... is not supported" at runtime.
          - "js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
    Properties:
      CodeUri: .
      Runtime: nodejs22.x
      Architectures:
        - arm64
      Handler: index.handler
      Timeout: 120
      MemorySize: 256
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - 's3:PutObject'
              Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/*'
      Environment:
        Variables:
          S3_BUCKET: !Ref BucketName
          TMDB_KEY: !Ref TmdbKey
          TMDB_POSTER_URL: !Ref TmdbPosterUrl
          TVDB_KEY: !Ref TvdbKey
          TVDB_PIN: !Ref TvdbPin
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
